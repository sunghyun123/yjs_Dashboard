<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YJS 운영 홈</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#0b3a67">
    <style>
        :root {
            --y-bg: #f4f7fb;
            --y-card: #ffffff;
            --y-primary: #1e4f87;
            --y-border: #dbe5f0;
            --y-text-subtle: #5f6f82;
        }

        body {
            margin: 0;
            background: var(--y-bg);
            font-family: 'Malgun Gothic', sans-serif;
            color: #172230;
        }

        .home-header {
            background: linear-gradient(110deg, #0b3a67, #1a5895);
            color: #fff;
            padding: 10px 0;
            box-shadow: 0 3px 14px rgba(8, 31, 58, 0.2);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1030;
        }

        .header-title {
            margin: 0;
            font-size: 1.38rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            line-height: 1;
            transform: skewX(-12deg);
            display: inline-block;
            background: linear-gradient(180deg, #ff5a46 0%, #e32727 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(255, 80, 60, 0.28);
        }

        .header-sub {
            font-size: 0.82rem;
            color: rgba(255, 255, 255, 0.82);
            margin: 0;
        }

        .app-top-nav {
            display: inline-flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .top-nav-shell {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.38);
            background: rgba(7, 28, 52, 0.24);
        }

        .top-nav-label {
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.82);
            line-height: 1;
        }

        .app-top-nav .btn {
            border-radius: 999px;
            font-size: 0.78rem;
            padding: 4px 11px;
            min-width: 74px;
            font-weight: 700;
        }

        .app-top-nav .btn:hover {
            transform: translateY(-1px);
        }

        .home-shell {
            padding-top: 88px;
            padding-bottom: 24px;
        }

        .home-card {
            border: 1px solid var(--y-border);
            border-radius: 14px;
            background: var(--y-card);
            box-shadow: 0 3px 10px rgba(13, 41, 69, 0.06);
        }

        .summary-value {
            font-size: 1.55rem;
            font-weight: 800;
            line-height: 1.1;
            color: #102a44;
        }

        .summary-label {
            font-size: 0.82rem;
            color: var(--y-text-subtle);
        }

        .section-title {
            font-size: 0.98rem;
            font-weight: 700;
            color: #1f3045;
        }

        .worker-row {
            border: 1px solid #e3ebf4;
            border-radius: 10px;
            background: #f9fbff;
            padding: 7px 10px;
        }

        .worker-row b {
            font-size: 0.95rem;
        }

        .worker-status-scroll {
            max-height: 330px;
            overflow-y: auto;
            padding-right: 2px;
        }

        .worker-status-scroll::-webkit-scrollbar {
            width: 8px;
        }

        .worker-status-scroll::-webkit-scrollbar-thumb {
            background: #c9d7e6;
            border-radius: 999px;
        }

        .worker-status-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .quick-link {
            border: 1px solid #d5e2f0;
            border-radius: 10px;
            padding: 10px;
            display: block;
            text-decoration: none;
            color: #1b3551;
            background: #f8fbff;
            font-weight: 700;
        }

        .quick-link:hover {
            background: #edf5ff;
            border-color: #b9cfe8;
        }

        .progress-carousel .carousel-indicators {
            position: static;
            margin: 10px 0 0;
        }

        .progress-carousel .carousel-indicators [data-bs-target] {
            background-color: #9eb5cc;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 0;
        }

        .progress-carousel .carousel-indicators .active {
            background-color: #2f5fa0;
            width: 22px;
            border-radius: 999px;
        }

        .progress-slide-card {
            border: 1px solid #e3ebf6;
            border-radius: 12px;
            padding: 10px 12px;
            background: #f8fbff;
            height: 100%;
        }

        .progress-project {
            font-weight: 800;
            font-size: 0.97rem;
            color: #1f3045;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-percent {
            font-weight: 800;
            color: #1c8b4c;
        }

        .progress-meta {
            font-size: 0.8rem;
            color: #5c6f84;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-slide-stack {
            display: grid;
            grid-template-rows: repeat(3, minmax(0, 1fr));
            gap: 8px;
            min-height: 252px;
        }

        .progress-slide-card.is-placeholder {
            visibility: hidden;
            pointer-events: none;
        }

        .mini-link-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 10px;
        }

        .mini-link {
            border: 1px solid #d6e2ef;
            border-radius: 12px;
            background: #f8fbff;
            text-decoration: none;
            color: #1a3655;
            padding: 10px 8px;
            text-align: center;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.15s ease;
        }

        .mini-link:hover {
            background: #edf5ff;
            border-color: #b7cee7;
            transform: translateY(-1px);
        }

        .mini-link-icon {
            font-size: 1.15rem;
            display: block;
            margin-bottom: 4px;
        }

        .mini-link-favicon {
            width: 18px;
            height: 18px;
            display: block;
            margin: 0 auto 4px;
            border-radius: 4px;
            object-fit: cover;
        }

        .mini-link-icon-fallback {
            display: block;
            margin-bottom: 4px;
            font-size: 1.1rem;
            line-height: 1;
        }

        #salesProfitChart {
            width: 100%;
            max-height: 290px;
        }

        .login-card {
            width: min(420px, 92vw);
            border-radius: 12px;
        }

        .time-stepper {
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .time-stepper-value {
            min-width: 90px;
            text-align: center;
            font-weight: 800;
            color: #1f3045;
        }

        .time-range-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.78rem;
            color: #6a7888;
            margin-top: 2px;
        }

        @media (max-width: 768px) {
            .header-title {
                font-size: 1.05rem;
            }

            .home-shell {
                padding-top: 124px;
            }

            .summary-value {
                font-size: 1.3rem;
            }

            .worker-status-scroll {
                max-height: 290px;
            }
        }
    </style>
</head>

<body>
    <header class="home-header">
        <div class="container-fluid px-3 px-md-4">
            <div class="d-flex justify-content-between align-items-start gap-2 flex-wrap">
                <div>
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                        <h1 class="header-title">YEC</h1>
                        <div class="top-nav-shell">
                            <span class="top-nav-label">메뉴</span>
                            <nav class="app-top-nav" aria-label="주요 화면 이동">
                                <a href="/home.html" class="btn btn-sm btn-light">홈</a>
                                <a href="/dashboard.html" class="btn btn-sm btn-outline-light">월간 계획표</a>
                                <a href="/index.html" class="btn btn-sm btn-outline-light">AI 비서</a>
                                <a href="/admin.html" id="drawerAdminLink" class="btn btn-sm btn-outline-warning js-admin-only d-none">관리자</a>
                            </nav>
                        </div>
                    </div>
                </div>
                <div class="d-flex align-items-center gap-2 flex-wrap justify-content-end">
                    <span id="homeNowLabel" class="badge text-bg-light text-dark">-</span>
                    <span id="homeUserBadge" class="badge rounded-pill text-bg-primary d-none"></span>
                    <button type="button" class="btn btn-sm btn-outline-light" onclick="logout()">로그아웃</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container-fluid px-3 px-md-4 home-shell">
        <section class="row g-3 mb-2">
            <div class="col-6 col-lg-4">
                <div class="home-card p-3">
                    <div class="summary-label">오늘 일정</div>
                    <div class="summary-value" id="kpiTodaySchedules">0</div>
                </div>
            </div>
            <div class="col-6 col-lg-4">
                <div class="home-card p-3">
                    <div class="summary-label">야간 작업</div>
                    <div class="summary-value" id="kpiNightSchedules">0</div>
                </div>
            </div>
            <div class="col-6 col-lg-4">
                <div class="home-card p-3">
                    <div class="summary-label">외출 인원</div>
                    <div class="summary-value" id="kpiOutingStaff">0</div>
                </div>
            </div>
        </section>

        <section class="row g-3">
            <div class="col-12 col-xl-6">
                <div class="home-card p-3 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div class="section-title">외출/행선표</div>
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="loadWorkerStatusHome()" title="새로고침" aria-label="새로고침">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                                <path d="M8 3a5 5 0 1 0 4.546 2.916.5.5 0 1 1 .908-.418A6 6 0 1 1 8 2v1z"/>
                                <path d="M8 0a.5.5 0 0 1 .5.5V2a.5.5 0 0 1-1 0V.5A.5.5 0 0 1 8 0z"/>
                                <path d="M8.5 2.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1 0-1z"/>
                            </svg>
                        </button>
                    </div>
                    <div class="worker-status-scroll">
                        <div id="workerStatusListHome" class="vstack gap-2"></div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-xl-6">
                <div class="home-card p-3 h-100">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div class="section-title">공사별 공정률 (예시)</div>
                        <span class="badge text-bg-light border">슬라이드</span>
                    </div>
                    <div id="projectProgressCarousel" class="carousel slide progress-carousel" data-bs-ride="carousel" data-bs-interval="5000" data-bs-pause="hover">
                        <div id="projectProgressCarouselInner" class="carousel-inner"></div>
                        <div id="projectProgressCarouselIndicators" class="carousel-indicators"></div>
                    </div>
                </div>
            </div>
        </section>

        <section class="row g-3 mt-1">
            <div class="col-12 col-xl-8">
                <div class="home-card p-3 h-100">
                    <div class="section-title mb-2">매출 / 손익 현황 (예시)</div>
                    <canvas id="salesProfitChart"></canvas>
                    <div class="small text-muted mt-2">* 현재는 화면 느낌 확인용 샘플 데이터입니다.</div>
                </div>
            </div>
            <div class="col-12 col-xl-4">
                <div class="home-card p-3 h-100">
                    <div class="section-title mb-2">바로가기 모음</div>
                    <div id="homeFrequentSiteList" class="mini-link-grid">
                        <div class="text-muted small">불러오는 중...</div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="modal fade" id="workerReturnTimeModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">복귀 시각 설정</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="small text-muted mb-2">드래그/버튼 모두 30분 단위로만 선택됩니다.</div>
                    <input id="workerReturnTimeSlider" class="form-range" type="range" min="0" max="47" step="1" value="18">
                    <div class="time-range-labels">
                        <span>00:00</span>
                        <span>23:30</span>
                    </div>
                    <div class="time-stepper">
                        <button type="button" class="btn btn-sm btn-outline-secondary" title="30분 감소"
                            onclick="shiftWorkerReturnTimeHome(-30)">▼</button>
                        <div id="workerReturnTimePreview" class="time-stepper-value">--:--</div>
                        <button type="button" class="btn btn-sm btn-outline-secondary" title="30분 증가"
                            onclick="shiftWorkerReturnTimeHome(30)">▲</button>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-sm btn-outline-secondary"
                        onclick="clearWorkerReturnTimeHome()">초기화</button>
                    <button type="button" class="btn btn-sm btn-primary" onclick="saveWorkerReturnTimeHome()">저장</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="dashboardLoginModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content login-card">
                <div class="modal-header">
                    <h5 class="modal-title">로그인</h5>
                </div>
                <div class="modal-body">
                    <p class="small text-muted mb-2">홈 화면 사용을 위해 카카오 계정으로 로그인해 주세요.</p>
                    <div id="dashboardLoginError" class="small text-danger mb-2" style="display: none;"></div>
                    <button type="button" class="btn btn-sm w-100 text-dark" style="background-color: #fee500;"
                        onclick="startKakaoLogin()">카카오로 로그인</button>
                </div>
                <div class="modal-footer">
                    <small class="text-muted text-center w-100">허용된 카카오 계정만 접속 가능합니다.</small>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/dashboard.auth.js?v=20260416"></script>
    <script src="/home.js?v=20260416"></script>
</body>

</html>
