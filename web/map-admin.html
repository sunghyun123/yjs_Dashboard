<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진행중 공사 지도 관리 · yjs_Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background: #f3f6f9; }
        .page-head { background: #fff; border-bottom: 1px solid #e5eaf0; }
        .editor-table { font-size: 0.84rem; }
        .editor-table th { background: #f1f5f9; white-space: nowrap; position: sticky; top: 0; z-index: 2; }
        .editor-table td { vertical-align: middle; }
        .editor-table input.form-control-sm { font-size: 0.82rem; }
        .table-scroll { max-height: calc(100vh - 250px); overflow: auto; }
        #adminMap { width: 100%; height: calc(100vh - 200px); min-height: 420px; border-radius: 10px; background: #e9eef3; }
        .map-sticky { position: sticky; top: 16px; }
        .st-badge { font-size: 0.72rem; }
        .pick-active { outline: 2px solid #2f6fed; outline-offset: -2px; }
        .help-box { font-size: 0.8rem; background: #f8fafc; border: 1px solid #e5eaf0; border-radius: 8px; }
        @media (max-width: 991px) { #adminMap { height: 380px; } .table-scroll { max-height: none; } }
    </style>
</head>
<body>
    <div class="page-head py-2 px-3 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-2">
            <a href="/home.html" class="btn btn-sm btn-light border">← 홈</a>
            <b>진행중 공사 지도 관리</b>
            <span id="whoami" class="text-muted small"></span>
        </div>
        <div class="d-flex align-items-center gap-2">
            <input id="monthLabel" class="form-control form-control-sm" style="width:120px" placeholder="예: 2026-06">
            <button id="btnSave" class="btn btn-sm btn-primary">저장</button>
        </div>
    </div>

    <div id="banner" class="alert m-0 rounded-0 py-2 px-3 d-none"></div>

    <div class="container-fluid py-3">
        <div class="row g-3">
            <!-- 왼쪽: 표 편집 -->
            <div class="col-12 col-lg-7">
                <div class="card">
                    <div class="card-body p-2">
                        <div class="d-flex flex-wrap gap-2 mb-2">
                            <button id="btnAddRow" class="btn btn-sm btn-outline-secondary">+ 행 추가</button>
                            <button id="btnPaste" class="btn btn-sm btn-outline-secondary">📋 엑셀에서 붙여넣기</button>
                            <button id="btnPreview" class="btn btn-sm btn-success">🗺️ 지도 미리보기</button>
                            <span id="rowInfo" class="ms-auto align-self-center text-muted small"></span>
                        </div>

                        <div id="pasteBox" class="mb-2 d-none">
                            <div class="help-box p-2 mb-1">
                                엑셀에서 <b>공번 · 공사명 · 담당자 · 공정률 · 주소</b> 순서의 열을 복사해 아래에 붙여넣으세요(탭으로 구분됨).
                                공사명만 있어도 됩니다. 주소는 비워도 되고, 비우면 공사명으로 자동 검색합니다.
                            </div>
                            <textarea id="pasteArea" class="form-control form-control-sm" rows="6"
                                placeholder="TY25-003&#9;안양 샘모루초교 지중화공사&#9;김무선&#9;0&#9;안양시 동안구 호계동 12-3"></textarea>
                            <div class="mt-1 d-flex gap-2 align-items-center">
                                <div class="form-check form-check-inline m-0">
                                    <input class="form-check-input" type="radio" name="pasteMode" id="pmReplace" value="replace" checked>
                                    <label class="form-check-label small" for="pmReplace">기존 목록 덮어쓰기</label>
                                </div>
                                <div class="form-check form-check-inline m-0">
                                    <input class="form-check-input" type="radio" name="pasteMode" id="pmAppend" value="append">
                                    <label class="form-check-label small" for="pmAppend">아래에 추가</label>
                                </div>
                                <button id="btnPasteApply" class="btn btn-sm btn-primary ms-auto">불러오기</button>
                            </div>
                        </div>

                        <div class="table-scroll">
                            <table class="table table-sm table-bordered editor-table mb-0">
                                <thead>
                                    <tr>
                                        <th style="width:34px">#</th>
                                        <th style="width:96px">공번</th>
                                        <th>공사명</th>
                                        <th style="width:96px">담당자</th>
                                        <th style="width:74px">공정률</th>
                                        <th style="width:170px">주소</th>
                                        <th style="width:84px">위치</th>
                                        <th style="width:84px">작업</th>
                                    </tr>
                                </thead>
                                <tbody id="rowsBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 오른쪽: 지도 -->
            <div class="col-12 col-lg-5">
                <div class="map-sticky">
                    <div id="mapHint" class="help-box p-2 mb-2">
                        <b>미리보기</b>를 누르면 핀이 뜹니다. 위치가 틀어진 핀은 <b>직접 끌어다</b> 옮기면 그 자리에 고정됩니다.
                        표의 <b>📍</b> 버튼을 누른 뒤 지도를 클릭해도 위치를 지정할 수 있습니다.
                    </div>
                    <div id="adminMap"></div>
                </div>
            </div>
        </div>
    </div>

    <datalist id="managerList">
        <option value="김무선"></option>
        <option value="김상훈"></option>
        <option value="이재규"></option>
        <option value="김단후"></option>
    </datalist>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/map-admin.js?v=20260618a"></script>
</body>
</html>
