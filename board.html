<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YJS 전자칠판 모드</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background:#0b1f3a; color:#fff; font-family:'Malgun Gothic',sans-serif; }
        .panel { background:#102b4e; border-radius:14px; padding:16px; }
        .item { background:#173a67; border-radius:10px; padding:12px; margin-bottom:10px; }
        .item.item-construction { background:#0f4aa0; border-left:4px solid #7eb2ff; }
        .item.item-general { background:#173a67; border-left:4px solid #6f7f95; }
        .memo-chip {
            display: inline-block;
            font-size: 0.75rem;
            border-radius: 999px;
            padding: 2px 8px;
            background: #dbe6f7;
            color: #102b4e;
            font-weight: 700;
        }
        .item-action-panel { display: none; border-top: 1px dashed rgba(255,255,255,0.2); margin-top: 8px; padding-top: 8px; }
        .item.active .item-action-panel { display: block; }
        .kiosk-btn { min-height: 52px; font-size: 1.05rem; font-weight: 700; }
        .kiosk-input { min-height: 48px; font-size: 1rem; }
        .kiosk-title { font-size: 1.2rem; font-weight: 700; }
        .floating-clock {
            position: fixed; right: 16px; bottom: 16px; z-index: 100;
            background: rgba(0,0,0,0.35); border-radius: 12px; padding: 8px 12px; font-size: 0.95rem;
        }
        .status-chip {
            display: inline-block;
            border-radius: 999px;
            padding: 4px 10px;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid transparent;
        }
        .status-info { background: #e6f0ff; color: #0b4ea2; border-color: #b9d3ff; }
        .status-success { background: #e7f7ec; color: #116b2f; border-color: #b8e3c5; }
        .status-warning { background: #fff4e5; color: #9a5c00; border-color: #ffe0b2; }
        .status-error { background: #fdeaea; color: #a50e0e; border-color: #f5b5b5; }
        .confirm-item { background:#0d2a52; border-radius:8px; padding:8px; margin-bottom:6px; font-size:0.9rem; }
    </style>
</head>
<body>
<div class="container-fluid py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="m-0 kiosk-title">전자칠판 상황판 모드</h2>
        <div class="d-flex gap-2 flex-wrap">
            <a href="/" class="btn btn-outline-light btn-sm">🤖 AI 비서</a>
            <a href="/dashboard.html" class="btn btn-outline-light btn-sm">📊 일반 상황판</a>
            <a href="/admin.html" class="btn btn-outline-light btn-sm">⚙ 관리자</a>
            <button class="btn btn-light btn-sm" onclick="loadAll()">새로고침</button>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-lg-8">
            <div class="panel">
                <h5>공사 일정</h5>
                <div id="scheduleList"></div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="panel mb-3">
                <h5>외출/야간/사무실</h5>
                <div class="mb-3 p-2 rounded" style="background:#0d2a52;">
                    <div class="small text-white-50 mb-1">빠른 변경 (이름·외출 시 장소/복귀 입력 후 버튼)</div>
                    <input id="statusUserName" class="form-control form-control-sm mb-2 kiosk-input" placeholder="이름">
                    <input id="statusLocation" class="form-control form-control-sm mb-2 kiosk-input" placeholder="외출/야간 장소">
                    <input id="statusUntilTime" class="form-control form-control-sm mb-2 kiosk-input" type="datetime-local" placeholder="외출 복귀 시각">
                    <div class="row g-2">
                        <div class="col-4"><button type="button" class="btn btn-success w-100 kiosk-btn py-2" onclick="applyMyStatus('사무실')">사무실</button></div>
                        <div class="col-4"><button type="button" class="btn btn-warning w-100 kiosk-btn py-2 text-dark" onclick="applyMyStatus('외출')">외출</button></div>
                        <div class="col-4"><button type="button" class="btn btn-danger w-100 kiosk-btn py-2" onclick="applyMyStatus('야간작업')">야간</button></div>
                    </div>
                </div>
                <div id="statusList"></div>
            </div>
            <div class="panel mb-3">
                <h5>전자칠판 템플릿 입력</h5>
                <div class="mb-2">
                    <span id="submitStatusChip" class="status-chip status-info">대기 중</span>
                </div>
                <select id="actionType" class="form-select form-select-sm mb-2 kiosk-input">
                    <option value="register">등록</option>
                    <option value="memo">메모</option>
                </select>
                <label class="form-label small mb-0 text-white-50">카테고리</label>
                <select id="templateCategory" class="form-select form-select-sm mb-2 kiosk-input">
                    <option value="공사 일정" selected>공사 일정</option>
                    <option value="일반 작업">일반 작업</option>
                    <option value="일정">일정</option>
                </select>
                <input id="date" class="form-control form-control-sm mb-2 kiosk-input" type="date">
                <input id="location" class="form-control form-control-sm mb-2 kiosk-input" placeholder="현장 위치 (일반 작업·레거시 작업 카테고리는 생략 가능)">
                <input id="task" class="form-control form-control-sm mb-2 kiosk-input" placeholder="작업/메모 제목">
                <textarea id="details" class="form-control form-control-sm mb-2 kiosk-input" rows="2" placeholder="상세 내용"></textarea>
                <div class="row g-2 mb-2">
                    <div class="col-6"><button class="btn btn-success w-100 kiosk-btn" onclick="quickMode('register')">등록</button></div>
                    <div class="col-6"><button class="btn btn-info w-100 kiosk-btn" onclick="quickMode('memo')">메모</button></div>
                </div>
                <button class="btn btn-light btn-sm w-100 kiosk-btn" onclick="submitTemplate()">전송</button>
            </div>
            <div class="panel">
                <h5>오늘 메모</h5>
                <div id="memoList"></div>
            </div>
        </div>
    </div>
</div>
<div class="floating-clock" id="clockBox">--:--:--</div>

<div class="modal fade" id="templateConfirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">템플릿 전송 확인</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="confirmSummaryBox"></div>
                <div class="small text-muted mt-2">등록/메모는 즉시 반영됩니다.</div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-sm btn-outline-secondary" data-bs-dismiss="modal">취소</button>
                <button type="button" class="btn btn-sm btn-primary" onclick="submitTemplateConfirmed()">전송</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let templateConfirmModal = null;
    let pendingTemplatePayload = null;
    const memoCountBySchedule = new Map();
    const linkedMemosBySchedule = new Map();

    function formatLocalDateYYYYMMDD(d = new Date()) {
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    const LEGACY_WORK_CATEGORIES = ['(작업)', '점검', '자재입고', '현장답사'];
    function displayCategoryLabel(category) {
        const c = String(category || '').trim();
        if (!c || c === '공사일정' || c === '공사 일정') return '공사 일정';
        return c;
    }
    function isGeneralWorkCategory(category) {
        const c = String(category || '').trim();
        return c === '일반 작업'
            || c === '(작업)'
            || LEGACY_WORK_CATEGORIES.includes(c)
            || c.includes('(작업)');
    }
    function isLocationOptionalCategory(cat) {
        const c = (cat || '').trim();
        if (c === '일반 작업') return true;
        if (c.includes('(작업)')) return true;
        return [...LEGACY_WORK_CATEGORIES, '일정'].includes(c);
    }

    function setSubmitStatus(type, text) {
        const chip = document.getElementById('submitStatusChip');
        chip.className = `status-chip status-${type}`;
        chip.textContent = text;
    }

    function actionTypeLabel(value) {
        const m = {
            register: '등록',
            memo: '메모'
        };
        return m[value] || value;
    }

    function buildTemplatePayload() {
        return {
            action_type: document.getElementById('actionType').value,
            date: document.getElementById('date').value.trim() || null,
            location: document.getElementById('location').value.trim(),
            task: document.getElementById('task').value.trim(),
            person: '',
            details: document.getElementById('details').value.trim(),
            category: document.getElementById('templateCategory').value.trim() || '공사 일정',
            request_note: '',
            schedule_id: null
        };
    }

    async function ensureSession() {
        const res = await fetch('/api/auth/me');
        if (!res.ok) {
            location.href = '/';
            return false;
        }
        return true;
    }

    async function loadSchedules() {
        const res = await fetch('/api/schedules/today');
        const data = await res.json();
        const list = document.getElementById('scheduleList');
        if (!res.ok) { list.innerHTML = '<div class="item">조회 실패</div>'; return; }
        const rows = data.data || [];
        list.innerHTML = rows.map(r => {
            const cardClass = isGeneralWorkCategory(r.category) ? 'item-general' : 'item-construction';
            const categoryLabel = displayCategoryLabel(r.category || '공사 일정');
            const loc = r.location ? `<div class="small text-white-50 mt-1">📍 ${r.location}</div>` : '';
            return `
            <div class="item ${cardClass}" data-schedule-id="${r.id}" onclick="toggleItemPanel(event, this)">
                <div class="d-flex justify-content-between align-items-start gap-2">
                    <div>
                        <div class="fw-bold fs-5">${r.task || '제목 없음'}</div>
                        <div class="small text-white-50">${r.date} · ${categoryLabel}</div>
                        ${loc}
                    </div>
                    <span class="memo-chip" data-memo-count-for="${r.id}">메모 0</span>
                </div>
                <div class="small text-light-emphasis mt-1">${r.details || ''}</div>
                <div data-linked-memos-for="${r.id}"></div>
                <div class="item-action-panel">
                    <div class="d-flex gap-2 mt-2">
                        <button class="btn btn-sm btn-outline-light" onclick="editScheduleDirect(${r.id})">수정</button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteScheduleDirect(${r.id})">삭제</button>
                    </div>
                    <div class="d-flex gap-2 mt-2">
                        <input id="scheduleMemoInput-${r.id}" class="form-control form-control-sm" placeholder="메모 작성">
                        <button class="btn btn-sm btn-outline-info" onclick="saveScheduleMemo(${r.id})">메모 작성</button>
                    </div>
                </div>
            </div>
        `;
        }).join('') || '<div class="item">일정 없음</div>';
        renderMemoCountsOnCards();
        renderLinkedMemosOnCards();
    }

    function toggleItemPanel(event, itemEl) {
        if (event.target.closest('button') || event.target.closest('input') || event.target.closest('textarea')) return;
        document.querySelectorAll('#scheduleList .item.active').forEach((el) => {
            if (el !== itemEl) el.classList.remove('active');
        });
        itemEl.classList.toggle('active');
    }

    function renderMemoCountsOnCards() {
        const chips = Array.from(document.querySelectorAll('[data-memo-count-for]'));
        chips.forEach((chip) => {
            const scheduleId = Number(chip.getAttribute('data-memo-count-for'));
            const count = memoCountBySchedule.get(scheduleId) || 0;
            chip.textContent = `메모 ${count}`;
        });
    }

    function renderLinkedMemosOnCards() {
        const boxes = Array.from(document.querySelectorAll('[data-linked-memos-for]'));
        boxes.forEach((box) => {
            const scheduleId = Number(box.getAttribute('data-linked-memos-for'));
            const linkedRows = linkedMemosBySchedule.get(scheduleId) || [];
            if (linkedRows.length === 0) {
                box.innerHTML = '';
                return;
            }
            box.innerHTML = linkedRows.map((m) => `
                <div class="small mt-2 p-2 rounded" style="background:#0d2a52;">
                    <div class="d-flex justify-content-between align-items-start gap-2">
                        <span>↳ ${m.content || ''}</span>
                        <button class="btn btn-sm btn-outline-light py-0 px-2" onclick="deleteMemo(${m.id})">삭제</button>
                    </div>
                </div>
            `).join('');
        });
    }

    async function editScheduleDirect(scheduleId) {
        const date = prompt('날짜(YYYY-MM-DD)를 입력하세요.');
        if (!date) return;
        const category = prompt('카테고리 (공사 일정, 일반 작업, 일정)', '공사 일정') || '공사 일정';
        const location = prompt('현장 위치 (일반 작업/레거시 작업 카테고리는 비워도 됨)') || '';
        if (!isLocationOptionalCategory(category) && !location.trim()) {
            alert('현장 위치를 입력하거나, 지역 생략 가능한 카테고리를 선택하세요.');
            return;
        }
        const task = prompt('작업 내용을 입력하세요.');
        if (!task) return;
        const details = prompt('상세 내용을 입력하세요.') || '';
        const res = await fetch('/api/schedules/direct-update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                schedule_id: Number(scheduleId),
                schedule_data: {
                    date,
                    location,
                    task,
                    person: '',
                    details,
                    tags: [],
                    category
                },
                reason: '전자칠판 인라인 수정'
            })
        });
        const data = await res.json();
        if (!res.ok) {
            alert(data.detail || '수정 실패');
            return;
        }
        alert(data.message || '수정 완료');
        await loadSchedules();
    }

    async function deleteScheduleDirect(scheduleId) {
        if (!confirm('해당 일정을 삭제하시겠습니까?')) return;
        const res = await fetch('/api/schedules/direct-delete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                schedule_id: Number(scheduleId),
                reason: '전자칠판 인라인 삭제'
            })
        });
        const data = await res.json();
        if (!res.ok) {
            alert(data.detail || '삭제 실패');
            return;
        }
        alert(data.message || '삭제 완료');
        await loadSchedules();
    }

    function userDataAttr(userName) {
        return encodeURIComponent(String(userName || ''));
    }

    function statusLabelText(status) {
        if (status === '야간작업') return '야간 작업';
        return status || '사무실';
    }

    function formatReturnTime(untilTime) {
        const raw = String(untilTime || '').trim();
        if (!raw) return '';
        const normalized = raw.replace(' ', 'T');
        const dt = new Date(normalized);
        if (!Number.isNaN(dt.getTime())) {
            const hh = String(dt.getHours()).padStart(2, '0');
            const mm = String(dt.getMinutes()).padStart(2, '0');
            return `${hh}:${mm}`;
        }
        const matched = raw.match(/(\d{2}):(\d{2})/);
        return matched ? `${matched[1]}:${matched[2]}` : raw;
    }

    async function postWorkerStatus(body) {
        const res = await fetch('/api/schedules/worker-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || '상태 저장 실패');
        return data;
    }

    async function applyMyStatus(status) {
        const user_name = document.getElementById('statusUserName').value.trim();
        if (!user_name) { alert('이름을 입력하세요.'); return; }
        const location = document.getElementById('statusLocation').value.trim();
        const until_time = document.getElementById('statusUntilTime').value.trim();
        try {
            await postWorkerStatus({
                user_name,
                status,
                location: status === '사무실' ? '' : location,
                until_time: status === '외출' ? until_time : '',
                note: ''
            });
            await loadStatus();
        } catch (e) {
            alert(e.message);
        }
    }

    async function quickRowStatusFromBtn(btn, status) {
        const userName = decodeURIComponent(btn.getAttribute('data-user') || '');
        await quickRowStatus(userName, status);
    }

    async function quickRowStatus(userName, status) {
        const location = document.getElementById('statusLocation').value.trim();
        const until_time = document.getElementById('statusUntilTime').value.trim();
        try {
            await postWorkerStatus({
                user_name: userName,
                status,
                location: status === '사무실' ? '' : location,
                until_time: status === '외출' ? until_time : '',
                note: ''
            });
            await loadStatus();
        } catch (e) {
            alert(e.message);
        }
    }

    async function loadStatus() {
        const res = await fetch('/api/schedules/worker-status');
        const data = await res.json();
        const list = document.getElementById('statusList');
        if (!res.ok) { list.innerHTML = '<div class="item">상태 조회 실패</div>'; return; }
        const rows = data.data || [];
        list.innerHTML = rows.map(r => {
            const du = userDataAttr(r.user_name);
            return `
            <div class="item">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
                    <span><b>${r.user_name}</b> <span class="badge bg-light text-dark">${statusLabelText(r.status)}</span></span>
                    <span class="small">
                        ${r.location || ''}
                        ${r.status === '외출' && r.until_time ? `<span class="fw-bold text-warning ms-1">복귀 시각: ${formatReturnTime(r.until_time)}</span>` : ''}
                    </span>
                </div>
                <div class="btn-group btn-group-sm w-100" role="group">
                    <button type="button" class="btn btn-success" data-user="${du}" onclick="quickRowStatusFromBtn(this,'사무실')">사무실</button>
                    <button type="button" class="btn btn-warning text-dark" data-user="${du}" onclick="quickRowStatusFromBtn(this,'외출')">외출</button>
                    <button type="button" class="btn btn-danger" data-user="${du}" onclick="quickRowStatusFromBtn(this,'야간작업')">야간</button>
                </div>
                <button type="button" class="btn btn-outline-light btn-sm w-100 mt-2" onclick="deleteStatusRow('${encodeURIComponent(r.user_name)}')">상태 삭제</button>
            </div>
        `;
        }).join('') || '<div class="item">상태 없음</div>';
    }

    async function loadMemos() {
        const today = formatLocalDateYYYYMMDD();
        const res = await fetch(`/api/schedules/memos?date=${today}`);
        const data = await res.json();
        const list = document.getElementById('memoList');
        if (!res.ok) { list.innerHTML = '<div class="item">메모 조회 실패</div>'; return; }
        const rows = data.data || [];
        memoCountBySchedule.clear();
        linkedMemosBySchedule.clear();
        rows.forEach((row) => {
            const linkedId = Number(row.linked_schedule_id || 0);
            if (!linkedId) return;
            memoCountBySchedule.set(linkedId, (memoCountBySchedule.get(linkedId) || 0) + 1);
            if (!linkedMemosBySchedule.has(linkedId)) linkedMemosBySchedule.set(linkedId, []);
            linkedMemosBySchedule.get(linkedId).push(row);
        });
        renderMemoCountsOnCards();
        renderLinkedMemosOnCards();
        const generalMemos = rows.filter((m) => !m.linked_schedule_id);
        list.innerHTML = generalMemos.map(m => `<div class="item">${m.content}</div>`).join('') || '<div class="item">메모 없음</div>';
    }

    async function deleteMemo(memoId) {
        if (!confirm('해당 메모를 삭제하시겠습니까?')) return;
        const res = await fetch(`/api/schedules/memos/${memoId}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) {
            alert(data.detail || data.message || '메모 삭제 실패');
            return;
        }
        await loadMemos();
    }

    async function deleteStatusRow(encodedUserName) {
        const userName = decodeURIComponent(encodedUserName || '');
        if (!userName) return;
        if (!confirm(`${userName} 상태 항목을 삭제하시겠습니까?`)) return;
        const res = await fetch(`/api/schedules/worker-status/${encodeURIComponent(userName)}`, { method: 'DELETE' });
        const data = await res.json();
        if (!res.ok) {
            alert(data.detail || data.message || '상태 삭제 실패');
            return;
        }
        await loadStatus();
    }

    async function saveScheduleMemo(scheduleId) {
        const input = document.getElementById(`scheduleMemoInput-${scheduleId}`);
        if (!input) return;
        const content = input.value.trim();
        if (!content) {
            alert('메모 내용을 입력하세요.');
            return;
        }
        const payload = {
            content,
            memo_type: '일반',
            visibility: 'all',
            linked_schedule_id: Number(scheduleId)
        };
        const res = await fetch('/api/schedules/memos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
            alert(data.detail || '메모 등록 실패');
            return;
        }
        input.value = '';
        await loadMemos();
    }

    function submitTemplate() {
        const payload = buildTemplatePayload();
        if (!payload.task && !payload.details) {
            alert('작업/메모 제목 또는 상세 내용을 입력하세요.');
            return;
        }
        if (payload.action_type === 'register') {
            if (!payload.task) {
                alert('공사명·작업명을 입력하세요.');
                return;
            }
            if (!isLocationOptionalCategory(payload.category) && !payload.location) {
                alert('현장 위치를 입력하거나, 일반 작업·레거시 작업 카테고리를 선택하세요.');
                return;
            }
        }
        pendingTemplatePayload = payload;
        const summaryRows = [
            `<div class="confirm-item"><b>유형</b>: ${actionTypeLabel(payload.action_type)}</div>`,
            `<div class="confirm-item"><b>카테고리</b>: ${displayCategoryLabel(payload.category || '공사 일정')}</div>`,
            `<div class="confirm-item"><b>날짜</b>: ${payload.date || '오늘'}</div>`,
            `<div class="confirm-item"><b>위치</b>: ${payload.location || '-'}</div>`,
            `<div class="confirm-item"><b>제목</b>: ${payload.task || '-'}</div>`
        ];
        document.getElementById('confirmSummaryBox').innerHTML = summaryRows.join('');
        templateConfirmModal.show();
    }

    async function submitTemplateConfirmed() {
        if (!pendingTemplatePayload) return;
        const payload = pendingTemplatePayload;
        pendingTemplatePayload = null;
        setSubmitStatus('warning', '전송 중...');
        const res = await fetch('/api/schedules/board/template-action', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) {
            setSubmitStatus('error', '전송 실패');
            alert(data.detail || '전송 실패');
            return;
        }
        templateConfirmModal.hide();
        setSubmitStatus('success', '전송 완료');
        alert(data.message || '전송 완료');
        resetTemplateForm();
        loadAll();
    }

    function quickMode(mode) {
        document.getElementById('actionType').value = mode;
    }

    function resetTemplateForm() {
        document.getElementById('location').value = '';
        document.getElementById('task').value = '';
        document.getElementById('details').value = '';
        document.getElementById('task').focus();
    }

    function updateClock() {
        const now = new Date();
        const text = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} `
            + `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
        document.getElementById('clockBox').textContent = text;
    }

    async function loadAll() {
        await Promise.all([loadSchedules(), loadStatus(), loadMemos()]);
    }

    ensureSession().then(ok => {
        if (!ok) return;
        templateConfirmModal = new bootstrap.Modal(document.getElementById('templateConfirmModal'));
        document.getElementById('date').value = formatLocalDateYYYYMMDD();
        document.getElementById('task').focus();
        loadAll();
        setInterval(loadAll, 30000);
        updateClock();
        setInterval(updateClock, 1000);
    });
</script>
</body>
</html>
